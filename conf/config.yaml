dataset:
  competition_handle: learning-agency-lab-automated-essay-scoring-2
  input_dir: null

model:
  architecture: transformer
  name: microsoft/deberta-v3-base
  max_length: 512
  truncation_strategy: first
  num_labels: 1
  task: regression
  gru:
    embedding_dim: 128
    hidden_size: 128
    num_layers: 1
    bidirectional: true
    dropout: 0.2

predict:
  batch_size: 8

train:
  seed: 42
  val_size: 0.2
  epochs: 5
  cv_folds: 1
  fold: null
  batch_size: 8
  lr: 0.00002
  weight_decay: 0.01
  scheduler: cosine

debug:
  enabled: false
  max_train_rows: 16
  max_val_rows: 8
  epochs: 1
  max_steps: 2
  batch_size: 8

output:
  dir: outputs
  checkpoint_path: best_model.pt
  artifact_dir: kaggle_dataset
  keep_checkpoint: false
  submission_name: submission.csv

hydra:
  run:
    dir: ${output.dir}/${now:%Y-%m-%d}/${now:%H-%M-%S}
