dataset:
  competition_handle: learning-agency-lab-automated-essay-scoring-2
  input_dir: null

model:
  name: microsoft/deberta-v3-base
  max_length: 512
  num_labels: 6

train:
  seed: 42
  val_size: 0.2
  epochs: 3
  batch_size: 8
  lr: 0.00002
  weight_decay: 0.01
  scheduler: cosine

debug:
  enabled: false
  max_train_rows: 16
  max_val_rows: 8
  epochs: 1
  max_steps: 2
  batch_size: 8

output:
  dir: outputs
  checkpoint_path: best_model.pt
  submission_name: submission.csv

hydra:
  run:
    dir: ${output.dir}/${now:%Y-%m-%d}/${now:%H-%M-%S}
